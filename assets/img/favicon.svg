<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Left ear (behind head) -->
  <polygon points="10,58 26,6 46,44" fill="#C07820"/>
  <polygon points="16,54 27,14 42,43" fill="#FFBCB0"/>
  <!-- Right ear (behind head) -->
  <polygon points="90,58 74,6 54,44" fill="#C07820"/>
  <polygon points="84,54 73,14 58,43" fill="#FFBCB0"/>
  <!-- Head -->
  <ellipse cx="50" cy="62" rx="37" ry="32" fill="#D4902B"/>
  <!-- Lighter forehead -->
  <ellipse cx="50" cy="52" rx="24" ry="19" fill="#E8A840"/>
  <!-- White blaze strip down center -->
  <ellipse cx="50" cy="54" rx="7" ry="14" fill="#F5E6C5"/>
  <!-- White muzzle -->
  <ellipse cx="50" cy="76" rx="21" ry="15" fill="#F5E6C5"/>
  <!-- Left eye white -->
  <circle cx="36" cy="58" r="7.5" fill="white"/>
  <!-- Left eye iris -->
  <circle cx="36" cy="58" r="5.5" fill="#2C1A0E"/>
  <!-- Left eye highlight -->
  <circle cx="34" cy="56" r="1.8" fill="white"/>
  <!-- Right eye white -->
  <circle cx="64" cy="58" r="7.5" fill="white"/>
  <!-- Right eye iris -->
  <circle cx="64" cy="58" r="5.5" fill="#2C1A0E"/>
  <!-- Right eye highlight -->
  <circle cx="62" cy="56" r="1.8" fill="white"/>
  <!-- Nose -->
  <ellipse cx="50" cy="70" rx="6" ry="4.5" fill="#111"/>
  <ellipse cx="48" cy="68.5" rx="2.2" ry="1.4" fill="#555"/>
  <!-- Mouth -->
  <line x1="50" y1="74.5" x2="50" y2="77.5" stroke="#7A4020" stroke-width="1.3" stroke-linecap="round"/>
  <path d="M 43 78 Q 50 83.5 57 78" stroke="#7A4020" stroke-width="1.5" fill="none" stroke-linecap="round"/>
</svg>
